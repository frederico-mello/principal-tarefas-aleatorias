{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Bem-vindo ao Tarefas Aleatórias</h1>
    
    <form id="formAtividade" class="form-group">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap;">
            <!-- Rótulo e Combobox em uma única linha -->
            <div style="display: flex; align-items: center; margin-right: 15px;">
                <label for="tipoAtividade" style="margin: 0 10px 0 0; white-space: nowrap;">Tipo de Atividade:</label>
                <select id="tipoAtividade" name="tipo" class="form-select" style="min-width: 150px;">
                    <option value="casa">Casa</option>
                    <option value="musica">Música</option>
                </select>
            </div>
            
            <!-- Checkbox de Filtro de Música -->
            <div style="display: flex; align-items: center;">
                <input type="checkbox" id="filtrarMusica" style="margin-right: 5px;">
                <label for="filtrarMusica" style="margin: 0; white-space: nowrap;">
                    Excluir tarefas relacionadas a música
                </label>
            </div>
        </div>

        <!-- Campo de Tempo -->
        <div class="form-group">
            <label for="tempoDisponivel" class="form-label">Quanto tempo você tem disponível? (minutos)</label>
            <input type="number" class="form-control" id="tempoDisponivel" name="tempo" min="1" value="60">
        </div>

        <!-- Botão de Envio -->
        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Gerar Atividade</button>
        </div>
    </form>

    <div id="erro" class="erro"></div>

    <div id="resultado">
        <h2>Sua Atividade Sugerida:</h2>
        <div id="atividade" class="atividade"></div>
        <div id="tempo" class="tempo"></div>
        <div id="detalhes" class="detalhes"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
